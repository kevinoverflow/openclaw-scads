services:
  openclaw:
    build: .
    image: openclaw-himalaya:latest
    container_name: openclaw
    restart: unless-stopped

    ports:
      - "${RESEARCH_CLOUD_IP}:18789:18789"

    environment:
      SCADS_API_KEY: ${SCADS_API_KEY}
      RESEARCH_CLOUD_IP: ${RESEARCH_CLOUD_IP}
      OPENCLAW_GATEWAY_BIND: lan
      OPENCLAW_GATEWAY_TOKEN: ${OPENCLAW_GATEWAY_TOKEN}

    volumes:
      - ./config:/home/node/.openclaw
      - ./workspace:/home/node/.openclaw/workspace
      - ./himalaya:/home/node/.config/himalaya
      - ./gcalcli:/home/node/.config/gcalcli
      - ./gcalcli-data:/home/node/.local/share/gcalcli
      - /home/service/tucloud/Documents/Wirtschaftsinformatik:/data
